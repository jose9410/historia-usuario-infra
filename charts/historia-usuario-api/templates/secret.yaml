apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app: historia-usuario-api
type: Opaque
stringData:
  AzureOpenAI__DeploymentName: {{ .Values.azureOpenAI.deploymentName | quote }}
  AzureOpenAI__Endpoint: {{ .Values.azureOpenAI.endpoint | quote }}
  AzureOpenAI__ApiKey: {{ .Values.azureOpenAI.apiKey | quote }}
  Anthropic__ApiKey: {{ .Values.anthropic.apiKey | quote }}
  Anthropic__ModelId: {{ .Values.anthropic.modelId | quote }}
