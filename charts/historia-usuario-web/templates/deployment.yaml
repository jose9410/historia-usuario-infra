apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-web
  labels:
    app: historia-usuario-web
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: historia-usuario-web
  template:
    metadata:
      labels:
        app: historia-usuario-web
    spec:
      containers:
        - name: historia-usuario-web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
