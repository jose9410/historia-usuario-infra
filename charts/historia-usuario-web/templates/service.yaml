apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-web-svc
  namespace: {{ .Release.Namespace }}
  labels:
    app: historia-usuario-web
spec:
  type: {{ .Values.service.type }}
  selector:
    app: historia-usuario-web
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: 80
